<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAMES — Fiches de Personnage Vierges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #1a1a1a;
      color: #2C1810;
    }

    .sheet {
      width: 794px;
      min-height: 1123px;
      margin: 0 auto 2rem;
      padding: 36px 40px 32px;
      position: relative;
      overflow: hidden;
      page-break-after: always;
      display: flex;
      flex-direction: column;
    }

    /* ─── CALIBRES ─── */
    .lin {
      background: #F5EDD8;
      --accent: #7A5C2E;
      --accent-light: #EDD8A8;
      --accent-mid: #B8965A;
      --badge-bg: #7A5C2E;
      --badge-text: #F5EDD8;
    }

    .laine {
      background: #E8EEF5;
      --accent: #2B5278;
      --accent-light: #BDD2E8;
      --accent-mid: #5B8DB8;
      --badge-bg: #2B5278;
      --badge-text: #E8EEF5;
    }

    .soie {
      background: #EDE8F5;
      --accent: #4A2D6E;
      --accent-light: #C8B8E8;
      --accent-mid: #8B5DB8;
      --badge-bg: #4A2D6E;
      --badge-text: #EDE8F5;
    }

    .or {
      background: #F5E8E8;
      --accent: #8B1515;
      --accent-light: #E8BABA;
      --accent-mid: #B84545;
      --badge-bg: #8B1515;
      --badge-text: #F5E8E8;
    }

    .sheet::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--accent);
    }

    .sheet::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent-mid);
      opacity: 0.5;
    }

    /* ─── HEADER ─── */
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--accent-mid);
    }

    .calibre-badge {
      display: inline-flex;
      align-items: center;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
    }

    .calibre-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--accent-mid);
      margin-top: 5px;
    }

    .header-right {
      text-align: right;
    }

    .game-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .game-subtitle {
      font-size: 10px;
      color: var(--accent-mid);
      letter-spacing: 0.08em;
      font-style: italic;
      margin-top: 2px;
    }

    /* ─── IDENTITY ─── */
    .identity-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    .field-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-mid);
      margin-bottom: 4px;
    }

    .field-line {
      border-bottom: 1px solid var(--accent-mid);
      height: 24px;
      width: 100%;
    }

    .field-line-lg {
      border-bottom: 1px solid var(--accent-mid);
      height: 28px;
      width: 100%;
    }

    /* ─── SECTION TITLES ─── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--accent-light);
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    /* ─── MOIRES ─── */
    .moires-box {
      background: var(--accent);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .moires-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .fil-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .fil-row:last-of-type {
      margin-bottom: 0;
    }

    .fil-label-block {
      min-width: 82px;
    }

    .fil-name {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent-light);
      text-transform: uppercase;
      opacity: 0.9;
    }

    .fil-mechanic {
      font-size: 9px;
      color: var(--accent-light);
      margin-top: 2px;
      opacity: 0.55;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.03em;
    }

    .fil-divider {
      width: 1px;
      background: var(--accent-light);
      opacity: 0.2;
      align-self: stretch;
      min-height: 36px;
    }

    .fil-input-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .fil-blank-line {
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      height: 18px;
    }

    .reserve-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .reserve-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--accent-light);
      opacity: 0.7;
      text-transform: uppercase;
    }

    .jetons {
      display: flex;
      gap: 5px;
    }

    .jeton {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-light);
      opacity: 0.5;
    }

    /* ─── TRAITS ─── */
    .traits-section {
      margin-bottom: 14px;
    }

    .traits-table {
      width: 100%;
      border-collapse: collapse;
    }

    .traits-table th {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-mid);
      padding: 0 5px 6px;
      text-align: left;
      border-bottom: 1px solid var(--accent-light);
    }

    .traits-table td {
      padding: 4px 5px;
      border-bottom: 0.5px solid var(--accent-light);
      vertical-align: middle;
    }

    .col-name {
      width: 38%;
    }

    .col-type {
      width: 18%;
    }

    .col-max {
      width: 10%;
    }

    .col-state {
      width: 34%;
    }

    .type-select {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-mid);
      opacity: 0.6;
      font-style: italic;
    }

    .max-blank {
      width: 28px;
      height: 18px;
      border-bottom: 1px solid var(--accent-mid);
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      opacity: 0.4;
    }

    .state-boxes {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .state-sq {
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--accent-mid);
      border-radius: 1px;
      opacity: 0.45;
    }

    .state-lbl {
      font-size: 7px;
      color: var(--accent-mid);
      font-family: 'Cinzel', serif;
      opacity: 0.55;
    }

    .name-blank {
      border-bottom: 1px solid var(--accent-mid);
      height: 18px;
      display: block;
      opacity: 0.5;
    }

    /* First row = archetype */
    .archetype-row td {
      background: rgba(0, 0, 0, 0.04);
      padding: 5px 5px;
    }

    .archetype-tag {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.9;
    }

    /* ─── BOTTOM GRID ─── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
    }

    /* ─── HEALTH ─── */
    .health-palier {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .palier-info {
      flex: 1;
    }

    .palier-name {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .palier-malus {
      font-size: 10px;
      font-style: italic;
      color: var(--accent-mid);
      margin-top: 1px;
    }

    .health-boxes {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding-top: 2px;
    }

    .health-box {
      width: 15px;
      height: 15px;
      border: 1.5px solid var(--accent-mid);
      border-radius: 2px;
      opacity: 0.55;
    }

    /* ─── RESOURCES ─── */
    .resource-item {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      margin-bottom: 9px;
    }

    .resource-num {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      min-width: 14px;
      line-height: 1;
      padding-bottom: 2px;
    }

    .resource-blank {
      flex: 1;
      border-bottom: 1px solid var(--accent-mid);
      height: 20px;
      opacity: 0.5;
    }



    /* ─── PRINT ─── */
    @media print {
      body {
        background: white;
      }

      .sheet {
        margin: 0;
        page-break-after: always;
      }
    }

    @page {
      size: A4;
      margin: 0;
    }
  </style>
</head>

<body>
  <script>
    const dice = ['d12', 'd10', 'd8', 'd6'];

    function stateBoxes() {
      return `<div class="state-boxes">
    ${dice.map(d => `<div class="state-box">
      <div class="state-sq"></div>
      <span class="state-lbl">${d}</span>
    </div>`).join('')}
  </div>`;
    }

    function healthBoxes(n) {
      return Array(n).fill('<div class="health-box"></div>').join('');
    }

    function jetons(n) {
      return Array(n).fill('<div class="jeton"></div>').join('');
    }

    function renderBlankSheet(config) {
      const { cls, label, sub, health } = config;

      return `
<div class="sheet ${cls}">
  <div class="sheet-header">
    <div>
      <div class="calibre-badge">${label}</div>
      <div class="calibre-sub">${sub}</div>
    </div>
    <div class="header-right">
      <div class="game-title">TRAMES</div>
      <div class="game-subtitle">Tisser les fils du Destin</div>
    </div>
  </div>

  <div class="identity-row">
    <div>
      <div class="field-label">Nom du héros</div>
      <div class="field-line-lg"></div>
    </div>
    <div>
      <div class="field-label">Archétype</div>
      <div class="field-line-lg"></div>
    </div>
  </div>

  <div class="moires-box">
    <div class="moires-title">Le Fuseau des Moires</div>

    <div class="fil-row">
      <div class="fil-label-block">
        <div class="fil-name">Clotho</div>
        <div class="fil-mechanic">La Conviction</div>
        <div class="fil-mechanic" style="margin-top:3px">1 jeton → +1d12</div>
      </div>
      <div class="fil-divider"></div>
      <div class="fil-input-area">
        <div class="fil-blank-line"></div>
        <div class="fil-blank-line"></div>
      </div>
    </div>

    <div class="fil-row">
      <div class="fil-label-block">
        <div class="fil-name">Lachésis</div>
        <div class="fil-mechanic">Le Destin</div>
        <div class="fil-mechanic" style="margin-top:3px">1×/session → +1d12</div>
      </div>
      <div class="fil-divider"></div>
      <div class="fil-input-area">
        <div class="fil-blank-line"></div>
        <div class="fil-blank-line"></div>
      </div>
    </div>

    <div class="fil-row">
      <div class="fil-label-block">
        <div class="fil-name">Atropos</div>
        <div class="fil-mechanic">Le Péché</div>
        <div class="fil-mechanic" style="margin-top:3px">Gagner 1 jeton → +1d4</div>
      </div>
      <div class="fil-divider"></div>
      <div class="fil-input-area">
        <div class="fil-blank-line"></div>
        <div class="fil-blank-line"></div>
      </div>
    </div>

    <div class="reserve-row">
      <div class="reserve-label">La Réserve du Fuseau</div>
      <div class="jetons">${jetons(7)}</div>
    </div>
  </div>

  <div class="traits-section">
    <div class="section-title">Traits (8 maximum au départ)</div>
    <table class="traits-table">
      <thead>
        <tr>
          <th class="col-name">Nom du trait</th>
          <th class="col-type">Catégorie</th>
          <th class="col-max">Max</th>
          <th class="col-state">État actuel (pendant la scène)</th>
        </tr>
      </thead>
      <tbody>
        <tr class="archetype-row">
          <td class="col-name"><div class="name-blank"></div></td>
          <td class="col-type"><span class="archetype-tag">Archétype</span></td>
          <td class="col-max"><span class="max-blank">d12</span></td>
          <td class="col-state">${stateBoxes()}</td>
        </tr>
        ${Array(9).fill(0).map((_, i) => `
        <tr>
          <td class="col-name"><div class="name-blank"></div></td>
          <td class="col-type"><span class="type-select">${i < 3 ? 'Comportement' : 'Capacité'}</span></td>
          <td class="col-max"><div class="max-blank"></div></td>
          <td class="col-state">${stateBoxes()}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>

  <div class="bottom-grid">
    <div>
      <div class="section-title">État de Santé</div>

      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Légère</div>
          <div class="palier-malus">Aucun malus</div>
        </div>
        <div class="health-boxes">${healthBoxes(health.effiloche)}</div>
      </div>

      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Grave</div>
          <div class="palier-malus">+1d4 (Fils Emmêlés)</div>
        </div>
        <div class="health-boxes">${healthBoxes(health.tendu)}</div>
      </div>

      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Mortelle</div>
          <div class="palier-malus">+3d4 (Fils Emmêlés)</div>
        </div>
        <div class="health-boxes">${healthBoxes(health.limite)}</div>
      </div>
    </div>

    <div>
      <div class="section-title">Ressources (1 à 5)</div>
      ${Array(5).fill(0).map((_, i) => `
      <div class="resource-item">
        <span class="resource-num">${i + 1}.</span>
        <div class="resource-blank"></div>
      </div>`).join('')}
    </div>
  </div>
</div>`;
    }

    const sheets = [
      {
        cls: 'lin',
        label: 'Fil de Lin',
        sub: 'Les héros sont mortels — chaque blessure compte.',
        health: { effiloche: 1, tendu: 2, limite: 2 }
      },
      {
        cls: 'laine',
        label: 'Fil de Laine',
        sub: 'Le standard de TRAMES — solides mais vulnérables.',
        health: { effiloche: 3, tendu: 3, limite: 3 }
      },
      {
        cls: 'soie',
        label: 'Fil de Soie',
        sub: 'Les héros sont taillés pour l\'aventure — l\'épopée prime.',
        health: { effiloche: 5, tendu: 4, limite: 3 }
      },
      {
        cls: 'or',
        label: 'Fil d\'Or',
        sub: 'Les héros sont légendaires — les Moires elles-mêmes regardent.',
        health: { effiloche: 6, tendu: 6, limite: 4 }
      }
    ];

    document.body.innerHTML = sheets.map(renderBlankSheet).join('');
  </script>
</body>

</html>
