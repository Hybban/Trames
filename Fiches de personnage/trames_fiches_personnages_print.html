<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAMES — Fiches de Personnages (Sans fond)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #1a1a1a;
    color: #2C1810;
  }

  .sheet {
    width: 794px;
    min-height: 1123px;
    margin: 0 auto 2rem;
    padding: 36px 40px 32px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }

  /* ─── CALIBRES ─── */
  .lin  { background: #ffffff; --accent: #7A5C2E; --accent-light: #EDD8A8; --accent-mid: #B8965A; --badge-bg: #7A5C2E; --badge-text: #ffffff; }
  .laine{ background: #ffffff; --accent: #2B5278; --accent-light: #BDD2E8; --accent-mid: #5B8DB8; --badge-bg: #2B5278; --badge-text: #ffffff; }
  .soie { background: #ffffff; --accent: #4A2D6E; --accent-light: #C8B8E8; --accent-mid: #8B5DB8; --badge-bg: #4A2D6E; --badge-text: #ffffff; }

  /* ─── DECORATIVE THREADS ─── */
  .sheet::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: var(--accent);
  }
  .sheet::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-mid);
    opacity: 0.5;
  }

  /* ─── HEADER ─── */
  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1.5px solid var(--accent-mid);
  }

  .calibre-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  .header-right {
    text-align: right;
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .game-subtitle {
    font-size: 10px;
    color: var(--accent-mid);
    letter-spacing: 0.08em;
    font-style: italic;
    margin-top: 2px;
  }

  /* ─── CHARACTER NAME ─── */
  .char-identity {
    margin-bottom: 18px;
  }

  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
    letter-spacing: 0.02em;
  }

  .char-archetype {
    font-size: 16px;
    font-style: italic;
    color: var(--accent-mid);
    margin-top: 4px;
    font-weight: 500;
  }

  /* ─── SECTION TITLES ─── */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--accent-light);
    padding-bottom: 4px;
    margin-bottom: 10px;
  }

  /* ─── MOIRES ─── */
  .moires-box {
    background: #ffffff;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .moires-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    opacity: 0.9;
  }

  .fil-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .fil-row:last-child { margin-bottom: 0; }

  .fil-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 80px;
    padding-top: 1px;
  }

  .fil-content {
    flex: 1;
  }

  .fil-text {
    font-size: 12px;
    color: #2C1810;
    line-height: 1.4;
    font-style: italic;
  }

  .fil-mechanic {
    font-size: 10px;
    color: var(--accent-mid);
    margin-top: 2px;
    opacity: 0.9;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
  }

  .fil-divider {
    width: 1px;
    background: var(--accent-mid);
    opacity: 0.3;
    align-self: stretch;
    min-height: 32px;
  }

  /* Réserve */
  .reserve-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--accent-light);
  }

  .reserve-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent);
    opacity: 0.8;
    text-transform: uppercase;
  }

  .jetons {
    display: flex;
    gap: 5px;
  }

  .jeton {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--accent-mid);
    opacity: 0.7;
  }

  /* ─── TRAITS ─── */
  .traits-section { margin-bottom: 16px; }

  .traits-table {
    width: 100%;
    border-collapse: collapse;
  }

  .traits-table th {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-mid);
    padding: 0 6px 6px;
    text-align: left;
    border-bottom: 1px solid var(--accent-light);
  }

  .traits-table th:last-child { text-align: center; }

  .traits-table td {
    padding: 5px 6px;
    font-size: 13px;
    border-bottom: 0.5px solid var(--accent-light);
    vertical-align: middle;
  }

  .trait-row.archetype-row td {
    background: rgba(0,0,0,0.02);
    font-weight: 600;
    font-size: 13.5px;
  }

  .trait-name-cell { width: 42%; color: #2C1810; }
  .trait-type-cell { width: 22%; }
  .trait-max-cell  { width: 8%; text-align: center; }
  .trait-state-cell{ width: 28%; text-align: right; }

  .type-badge {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-mid);
    opacity: 0.8;
  }

  .max-die {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }

  .archetype-row .max-die {
    font-size: 13px;
  }

  .state-boxes {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
    align-items: center;
  }

  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .state-sq {
    width: 13px;
    height: 13px;
    border: 1.5px solid var(--accent-mid);
    border-radius: 1px;
    opacity: 0.5;
  }

  .state-sq.active {
    opacity: 1;
    background: var(--accent);
    border-color: var(--accent);
  }

  .state-label {
    font-size: 7px;
    color: var(--accent-mid);
    font-family: 'Cinzel', serif;
    opacity: 0.6;
  }

  /* ─── BOTTOM TWO COLUMNS ─── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 4px;
  }

  /* ─── HEALTH ─── */
  .health-palier {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .palier-info { flex: 1; }

  .palier-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .palier-malus {
    font-size: 10px;
    font-style: italic;
    color: var(--accent-mid);
    margin-top: 1px;
  }

  .health-boxes {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
    padding-top: 2px;
  }

  .health-box {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--accent-mid);
    border-radius: 2px;
    opacity: 0.6;
  }

  /* ─── RESOURCES ─── */
  .resource-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 7px;
    font-size: 12.5px;
    line-height: 1.35;
  }

  .resource-num {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    min-width: 14px;
    padding-top: 1px;
  }

  .resource-text {
    color: #2C1810;
    font-style: italic;
  }

  .resource-note {
    display: block;
    font-size: 11px;
    color: var(--accent-mid);
    font-style: normal;
    margin-top: 1px;
    opacity: 0.8;
  }

  /* ─── PRINT ─── */
  @media print {
    body { background: white; }
    .sheet { margin: 0; page-break-after: always; }
  }

  @page { size: A4; margin: 0; }

  /* Group separator */
  .group-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    color: #888;
    padding: 1.5rem 0 0.5rem;
  }
</style>
</head>
<body>
<script>
const dice = ['d12','d10','d8','d6'];

function boxes(n, color) {
  return Array(n).fill(`<div class="health-box"></div>`).join('');
}

function stateBoxes(maxDie) {
  return `<div class="state-boxes">
    ${dice.map(d => `<div class="state-box">
      <div class="state-sq${d===maxDie?' active':''}"></div>
      <span class="state-label">${d}</span>
    </div>`).join('')}
  </div>`;
}

function jetons(n) {
  return Array(n).fill('<div class="jeton"></div>').join('');
}

function renderSheet(c) {
  const isArchetype = (t) => t.type === 'Archétype';
  return `
<div class="sheet ${c.group}">
  <div class="sheet-header">
    <div>
      <div class="calibre-badge">${c.groupLabel}</div>
    </div>
    <div class="header-right">
      <div class="game-title">TRAMES</div>
      <div class="game-subtitle">Tisser les fils du Destin</div>
    </div>
  </div>

  <div class="char-identity">
    <div class="char-name">${c.name}</div>
    <div class="char-archetype">${c.archetype}</div>
  </div>

  <div class="moires-box">
    <div class="moires-title">Le Fuseau des Moires</div>
    <div class="fil-row">
      <div class="fil-label">Clotho<br>Conviction</div>
      <div class="fil-divider"></div>
      <div class="fil-content">
        <div class="fil-text">${c.moires.clotho}</div>
        <div class="fil-mechanic">Dépenser 1 jeton → +1d12</div>
      </div>
    </div>
    <div class="fil-row">
      <div class="fil-label">Lachésis<br>Destin</div>
      <div class="fil-divider"></div>
      <div class="fil-content">
        <div class="fil-text">${c.moires.lachesis}</div>
        <div class="fil-mechanic">1×/session, gratuit → +1d12</div>
      </div>
    </div>
    <div class="fil-row">
      <div class="fil-label">Atropos<br>Péché</div>
      <div class="fil-divider"></div>
      <div class="fil-content">
        <div class="fil-text">${c.moires.atropos}</div>
        <div class="fil-mechanic">Gagner 1 jeton → +1d4 au jet</div>
      </div>
    </div>
    <div class="reserve-row">
      <div class="reserve-label">La Réserve du Fuseau</div>
      <div class="jetons">${jetons(7)}</div>
    </div>
  </div>

  <div class="traits-section">
    <div class="section-title">Traits</div>
    <table class="traits-table">
      <thead>
        <tr>
          <th class="trait-name-cell">Nom du trait</th>
          <th class="trait-type-cell">Catégorie</th>
          <th class="trait-max-cell">Max</th>
          <th class="trait-state-cell">État actuel (scène)</th>
        </tr>
      </thead>
      <tbody>
        ${c.traits.map(t => `
        <tr class="trait-row${t.type==='Archétype'?' archetype-row':''}">
          <td class="trait-name-cell">${t.name}</td>
          <td class="trait-type-cell"><span class="type-badge">${t.type}</span></td>
          <td class="trait-max-cell"><span class="max-die">${t.max}</span></td>
          <td class="trait-state-cell">${stateBoxes(t.max)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>

  <div class="bottom-grid">
    <div>
      <div class="section-title">État de Santé</div>
      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Légère</div>
          <div class="palier-malus">Aucun malus</div>
        </div>
        <div class="health-boxes">${boxes(c.health.effiloche)}</div>
      </div>
      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Grave</div>
          <div class="palier-malus">+1d4 (Fils Emmêlés)</div>
        </div>
        <div class="health-boxes">${boxes(c.health.tendu)}</div>
      </div>
      <div class="health-palier">
        <div class="palier-info">
          <div class="palier-name">Blessure Mortelle</div>
          <div class="palier-malus">+3d4 (Fils Emmêlés)</div>
        </div>
        <div class="health-boxes">${boxes(c.health.limite)}</div>
      </div>
    </div>

    <div>
      <div class="section-title">Ressources</div>
      ${c.resources.map((r,i) => {
        const [main, note] = r.split(' — ');
        return `<div class="resource-item">
          <span class="resource-num">${i+1}.</span>
          <span class="resource-text">${main}${note?`<span class="resource-note">${note}</span>`:''}</span>
        </div>`;
      }).join('')}
    </div>
  </div>
</div>`;
}
